<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Placement Sessions</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <header class="bg-blue-900 text-white shadow-md py-4 px-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🏢</span>
            <h1 class="text-xl font-bold tracking-wide">Internship Placement Hub</h1>
        </div>
        <a href="/index.html" class="bg-blue-800 hover:bg-blue-700 text-xs font-semibold px-4 py-2 rounded-lg transition-colors">
            🏠 Main Menu
        </a>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white border border-gray-200 p-6 rounded-2xl shadow-sm">
                <h3 class="text-blue-900 font-bold text-lg mb-4">➕ Publish New Registry</h3>
                <form action="/api/companies" method="POST" enctype="multipart/form-data" class="space-y-3.5 text-xs">
                    <div>
                        <label class="block font-semibold text-gray-700 mb-1">Company Name</label>
                        <input type="text" name="name" class="w-full p-2.5 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-700 mb-1">HQ Location</label>
                        <input type="text" name="location" class="w-full p-2.5 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-700 mb-1">Engineering Field</label>
                        <input type="text" name="field" class="w-full p-2.5 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-700 mb-1">HR Email</label>
                        <input type="email" name="contact" class="w-full p-2.5 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-700 mb-1">Phone Line</label>
                        <input type="text" name="phone" class="w-full p-2.5 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-700 mb-1">Logo Banner Image</label>
                        <input type="file" name="companyImage" class="w-full bg-gray-50 p-2 border rounded-lg">
                    </div>
                    <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-2.5 rounded-lg text-sm cursor-pointer transition-colors">
                        Publish Placement
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-4">
            <h2 class="text-xl font-bold text-gray-900">🏢 Verified Corporate Placements</h2>
            <div id="companies-container" class="space-y-4">
                </div>
        </div>
    </main>

    <script>
        function loadPlacements() {
            fetch('/api/companies')
                .then(res => res.json())
                .then(companyArray => {
                    const container = document.getElementById('companies-container');
                    container.innerHTML = '';
                    
                    companyArray.forEach(comp => {
                        container.innerHTML += `
                            <div class="bg-white border rounded-2xl overflow-hidden flex flex-col md:flex-row shadow-sm border-gray-100">
                                <div class="md:w-1/3 h-40 md:h-auto bg-gray-50">
                                    <img src="${comp.image}" class="w-full h-full object-cover">
                                </div>
                                <div class="p-5 md:w-2/3 flex flex-col justify-between">
                                    <div>
                                        <div class="flex justify-between items-start">
                                            <h3 class="font-bold text-xl text-gray-900">${comp.name}</h3>
                                            <span class="text-xs font-semibold bg-blue-50 text-blue-700 px-2.5 py-1 rounded-full border border-blue-200">📍 ${comp.location}</span>
                                        </div>
                                        <p class="text-sm text-gray-700 mt-2 font-medium bg-gray-50 p-2.5 rounded border-l-4 border-blue-900">🎯 Focus: ${comp.field}</p>
                                    </div>
                                    <div class="mt-4 pt-3 border-t border-gray-100 grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
                                        <p class="text-gray-600">📧 <span class="font-semibold text-blue-900 ml-1">${comp.contact}</span></p>
                                        <p class="text-gray-600">📞 <span class="font-semibold text-gray-800 ml-1">${comp.phone}</span></p>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                });
        }
        document.addEventListener('DOMContentLoaded', loadPlacements);
    </script>
</body>
</html>
